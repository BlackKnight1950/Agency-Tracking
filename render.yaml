services:
  - type: web
    name: arc-decision-portal
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: SMARTSHEET_TOKEN
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
